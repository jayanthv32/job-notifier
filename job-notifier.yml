name: job-notifier

on:
  schedule:
    # every 10 minutes. GitHub's scheduler can lag a few minutes under load,
    # this is the practical fast end of "free" polling.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit seen_jobs.json back

concurrency:
  group: job-notifier
  cancel-in-progress: false   # never kill a mid-flight run; queue instead

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run job notifier (single pass)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL_PRIORITY: ${{ secrets.DISCORD_WEBHOOK_URL_PRIORITY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
        run: python job_notifier.py --once

      - name: Commit updated seen_jobs.json
        run: |
          git config user.name "job-notifier-bot"
          git config user.email "actions@users.noreply.github.com"
          git add seen_jobs.json
          git diff --cached --quiet || git commit -m "Update seen jobs [skip ci]"
          git push
